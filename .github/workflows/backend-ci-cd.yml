name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
  workflow_dispatch:  # Allow manual triggering

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: latest
  CONTAINER_NAME: collegepathfinder-backend
  APP_PORT: 8005
  DEPLOY_DIR: ~/college-pathfinder

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: ./apps/backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linting (Ruff)
        run: |
          ruff check .

  build-and-push:
    name: Build and Push to ECR
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          FULL_IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f apps/backend/Dockerfile \
            -t $FULL_IMAGE \
            --push \
            apps/backend
          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Validate key format
          if ! ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "Error: Invalid SSH key format"
            exit 1
          fi

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>&1 || true

          # Test connection
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} echo "SSH connection successful" || {
              echo "Error: Cannot connect to EC2 — check EC2_HOST, EC2_SSH_KEY, and Security Group (port 22)"
              exit 1
            }

      - name: Write .env to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}"

          # Write fresh .env from GitHub secrets
          # POSTGRES_URL is always localhost (self-hosted postgres on EC2, --network host)
          # DATABASE_URL is the SQLite file path for KCET college data (read-only, bundled in image)
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > ${{ env.DEPLOY_DIR }}/.env << 'ENVEOF'
          POSTGRES_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/collegefinder
          DATABASE_URL=data/kcet_2024.db
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          EMAIL_ENABLED=true
          FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}
          CORS_ORIGINS=https://college-finder.chetanr25.in,https://collegepathfinder.chetanr25.in,https://collegepathfinder.vercel.app,http://localhost:3000,http://localhost:5173
          DEFAULT_ROUND=1
          MIN_ROUND=1
          MAX_ROUND=3
          ENVEOF"

      - name: Pull Image and Redeploy Container
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            # Authenticate with ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Pull latest image
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            # Stop docker-compose backend if running (pipeline container replaces it)
            docker stop infra-backend-1 2>/dev/null || true
            docker rm infra-backend-1 2>/dev/null || true

            # Stop and remove old backend container (ignore errors if not running)
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Start new backend container on infra_default network (where postgres lives)
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network infra_default \
              --restart unless-stopped \
              --env-file ${{ env.DEPLOY_DIR }}/.env \
              -e POSTGRES_URL=postgresql+asyncpg://postgres:postgres@infra-postgres-1:5432/collegefinder \
              -p 8005:8005 \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            # Remove dangling images to free disk space
            docker image prune -f

            echo "Container started at $(date)"
          ENDSSH