services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: collegefinder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile.dev
    ports:
      - "8005:8005"
    volumes:
      - ../app/backend:/app
      - /app/.venv
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/collegefinder
      DATABASE_URL: /app/data/kcet_2024.db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
